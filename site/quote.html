<!doctype html>
<html lang="en">
  <head>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

          <p class="mt-8 text-center text-sm text-slate">Or call <a href="tel:12505578733" class="font-semibold text-forest">1-250-557-TREE (8733)</a> or <a href="tel:12508580525" class="font-semibold text-forest">250-858-0525 (Cell)</a></p>
